<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air Writing MVP</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    h3 {
      margin-top: 10px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
    }

    canvas {
      border: 2px solid black;
      margin-top: 10px;
      background: white;
      touch-action: none;
    }
  </style>
</head>

<body>

<h3>Air Writing MVP</h3>

<button onclick="enableMotion()">Enable Motion</button>
<button onclick="toggleDraw()">Toggle Draw</button>
<button onclick="clearCanvas()">Clear</button>

<br>

<canvas id="canvas" width="300" height="400"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let x = canvas.width / 2;
let y = canvas.height / 2;

ctx.beginPath();
ctx.moveTo(x, y);

// Drawing control
let isDrawing = true;

// Motion tracking
let lastX = 0;
let lastY = 0;

// Smoothed movement
let smoothDX = 0;
let smoothDY = 0;

// Tuning parameters
const alpha = 0.2;      // smoothing (lower = smoother)
const sensitivity = 5;  // movement speed

function draw(x, y) {
  ctx.lineTo(x, y);
  ctx.stroke();
}

function toggleDraw() {
  isDrawing = !isDrawing;

  if (isDrawing) {
    ctx.beginPath();
    ctx.moveTo(x, y);
  }
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
  ctx.moveTo(x, y);
}

function enableMotion() {
  if (typeof DeviceMotionEvent.requestPermission === "function") {
    DeviceMotionEvent.requestPermission().then(response => {
      if (response === "granted") {
        startMotion();
      } else {
        alert("Permission denied");
      }
    });
  } else {
    startMotion();
  }
}
function startMotion() {
  window.addEventListener("devicemotion", (event) => {
    const rotation = event.rotationRate;
    if (!rotation) return;

    // Use rotation instead of acceleration
    let dx = rotation.gamma * 0.5; // left/right tilt
    let dy = rotation.beta * 0.5;  // forward/back tilt

    // Apply smoothing
    smoothDX = alpha * dx + (1 - alpha) * smoothDX;
    smoothDY = alpha * dy + (1 - alpha) * smoothDY;

    // Update position
    x += smoothDX;
    y += smoothDY;

    // Clamp inside canvas
    x = Math.max(0, Math.min(canvas.width, x));
    y = Math.max(0, Math.min(canvas.height, y));

    // Draw
    if (isDrawing) {
      draw(x, y);
    }
  });
}

</script>

</body>
</html>
