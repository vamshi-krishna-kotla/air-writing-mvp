<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air Writing MVP - Calibrated</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f5f5f5;
    }

    button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }

    canvas {
      border: 2px solid black;
      margin-top: 10px;
      background: white;
    }
  </style>
</head>

<body>

<h3>Air Writing MVP (Calibrated Mode)</h3>

<button onclick="enableMotion()">Enable Motion</button>
<button onclick="calibrate()">Calibrate</button>
<button onclick="clearCanvas()">Clear</button>

<br>

<canvas id="canvas" width="300" height="400"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let x = canvas.width / 2;
let y = canvas.height / 2;

let isDrawing = false;
let path = [];

// Calibration baseline
let baseBeta = 0;
let baseGamma = 0;

// Smoothing
let smoothDX = 0;
let smoothDY = 0;
const alpha = 0.2;

function drawScene() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // draw path
  if (path.length > 0) {
    ctx.beginPath();
    path.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.stroke();
  }

  // draw cursor
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fillStyle = "red";
  ctx.fill();
}

// Touch controls
canvas.addEventListener("touchstart", () => {
  isDrawing = true;
});

canvas.addEventListener("touchend", () => {
  isDrawing = false;
});

// Clear
function clearCanvas() {
  path = [];
  drawScene();
}

// Enable motion
function enableMotion() {
  if (typeof DeviceMotionEvent.requestPermission === "function") {
    DeviceMotionEvent.requestPermission().then(res => {
      if (res === "granted") startMotion();
    });
  } else {
    startMotion();
  }
}

// Calibrate baseline
function calibrate() {
  alert("Hold phone still and tap OK");
  baseBeta = lastBeta;
  baseGamma = lastGamma;
}

// Track latest rotation
let lastBeta = 0;
let lastGamma = 0;

function startMotion() {
  window.addEventListener("devicemotion", (event) => {
    const rot = event.rotationRate;
    if (!rot) return;

    lastBeta = rot.beta || 0;
    lastGamma = rot.gamma || 0;

    // Relative movement
    let dx = (lastGamma - baseGamma) * 0.05;
    let dy = (lastBeta - baseBeta) * 0.05;

    // Dead zone
    if (Math.abs(dx) < 0.01) dx = 0;
    if (Math.abs(dy) < 0.01) dy = 0;

    // Smooth
    smoothDX = alpha * dx + (1 - alpha) * smoothDX;
    smoothDY = alpha * dy + (1 - alpha) * smoothDY;

    x += smoothDX * 10;
    y += smoothDY * 10;

    // Clamp
    x = Math.max(0, Math.min(canvas.width, x));
    y = Math.max(0, Math.min(canvas.height, y));

    if (isDrawing) {
      path.push({ x, y });
    }

    drawScene();
  });
}

drawScene();
</script>

</body>
</html>
